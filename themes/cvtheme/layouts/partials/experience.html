<section id="experience" class="cv-section">
    <h2 class="cv-section-title">Experience</h2>
    <div class="cv-list">
        {{ range .Params.experience }}
        <article class="cv-entry">
            <div class="cv-entry-head">
                <h3 class="cv-entry-title">{{ .position }}</h3>
                <span class="cv-entry-rule"></span>
                <p class="cv-entry-period">{{ .period }}</p>
            </div>
            <p class="cv-entry-meta">{{ .company }}</p>
            {{ with .description }}
            <p class="cv-entry-description">{{ . }}</p>
            {{ end }}
        </article>
        {{ end }}
    </div>
</section>
