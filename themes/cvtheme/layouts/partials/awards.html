{{ with .Params.awards }}
<section id="awards" class="cv-section">
    <h2 class="cv-section-title">Awards</h2>
    <div class="cv-list">
        {{ range . }}
        <article class="cv-entry">
            <div class="cv-entry-head">
                <h3 class="cv-entry-title">{{ .title }}</h3>
                <span class="cv-entry-rule"></span>
                {{ with .period }}<p class="cv-entry-period">{{ . }}</p>{{ end }}
            </div>
            {{ with .organization }}<p class="cv-entry-meta">{{ . }}</p>{{ end }}
            {{ with .description }}<p class="cv-entry-description">{{ . }}</p>{{ end }}
            {{ with .link }}
            <div class="cv-link-row">
                <a href="{{ . }}" class="cv-link-chip">Link</a>
            </div>
            {{ end }}
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
