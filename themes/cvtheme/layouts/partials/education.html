<section id="education" class="cv-section">
    <h2 class="cv-section-title">Education</h2>
    <div class="cv-list">
        {{ range .Params.education }}
        <article class="cv-entry">
            <div class="cv-entry-head">
                <h3 class="cv-entry-title">{{ .degree }}</h3>
                <span class="cv-entry-rule"></span>
                <p class="cv-entry-period">{{ .period }}</p>
            </div>
            <p class="cv-entry-meta">{{ .institution }}</p>
        </article>
        {{ end }}
    </div>
</section>
